# =============================================================================
# EEEM068: Industrial Waste Classification
# base.yaml — LOCKED CONSTANTS
# =============================================================================
# This file contains values that are fixed for the entire project.
# DO NOT edit this file during experiments.
# If a value needs changing, discuss with the full team first.
#
# All experiment configs inherit from this file via the 'base' key.
# Any value set in an experiment config will override the value here.
# =============================================================================

# -----------------------------------------------------------------------------
# DATASET — fixed by WaRP-C
# -----------------------------------------------------------------------------
dataset:
  n_classes: 28
  img_width: 224
  img_height: 224
  seed: 42
  val_split: 0.2                              # must match value used in prepare_data.py
  data_root: "data/"
  train_csv: "dataset/train.csv"
  val_csv: "dataset/val.csv"
  test_csv: "dataset/test.csv"
  class_mapping: "dataset/class_mapping.json" # label <-> class name lookup

# -----------------------------------------------------------------------------
# OPTIMIZER — agreed team-wide for fair cross-model comparison
# -----------------------------------------------------------------------------
optimizer:
  type: "adam"
  adam_beta1: 0.9
  adam_beta2: 0.999
  weight_decay: 0.0005
  momentum: 0.9                               # used only if type: sgd
  sgd_dampening: 0
  sgd_nesterov: false

# -----------------------------------------------------------------------------
# SCHEDULER — agreed team-wide
# -----------------------------------------------------------------------------
scheduler:
  type: "CosineAnnealingLR"

# -----------------------------------------------------------------------------
# AUGMENTATION — base/phase 1 defaults (locked for phase 1)
# Only brightness, contrast, saturation, hue may be changed in phase 2
# -----------------------------------------------------------------------------
augmentation:
  random_horizontal_flip: true
  random_crop: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.1                                    # keep low — hue shifts mislead waste classifiers

# -----------------------------------------------------------------------------
# EVALUATION — fixed for all runs
# Always evaluate on the same metrics, same batch size, same test set
# -----------------------------------------------------------------------------
evaluation:
  batch_size: 32
  per_class_report: true
  metrics:
    - "accuracy"
    - "f1_macro"
    - "precision_macro"
    - "recall_macro"
    - "mAP"
    - "auc"

# -----------------------------------------------------------------------------
# OUTPUT STRUCTURE
# {model} is resolved at runtime to the model name from run.model
# e.g. experiments/results/resnet50/phase1_lr1e-4_bs64/
# -----------------------------------------------------------------------------
output:
  base_dir: "experiments/results/{model}/"
  log_interval: 10                            # print training progress every N batches
  save_best_only: true                        # only keep the best checkpoint per run
  save_loss_curves: true
  save_confusion_matrix: true
  save_gradcam: false                         # overridden to true in phase 2 configs
