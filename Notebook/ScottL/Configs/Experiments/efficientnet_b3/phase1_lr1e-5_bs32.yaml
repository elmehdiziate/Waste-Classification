base: configs/base.yaml
run:
  name: phase1_lr1e-5_bs32
  model: efficientnet_b3
  phase: 1
  author: TBD
  notes: Phase 1 grid run. lr=1e-5, bs=32.
training:
  learning_rate: 1.0e-05
  batch_size: 32
  epochs: 30
  pretrained: true
  use_weighted_sampler: false
