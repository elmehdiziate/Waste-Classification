base: configs/base.yaml
run:
  name: phase1_lr5e-5_bs64
  model: swin_t
  phase: 1
  author: TBD
  notes: Phase 1 grid run. lr=5e-5, bs=64.
training:
  learning_rate: 5.0e-05
  batch_size: 64
  epochs: 30
  pretrained: true
  use_weighted_sampler: false
  label_smoothing: 0.0
  mixed_precision: false
fine_tuning:
  staged_lr: false
  base_lr_mult: 0.1
  new_layers:
  - head
  T_max: 20
  gamma: 0.1
  stepsize:
  - 20
  - 40
output:
  save_gradcam: false
